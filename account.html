<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="shell-with-sidebar">
  <div class="category-nav">
    <a class="nav-title" href="dashboard.html" data-i18n="categories_title" style="text-decoration:none; color:inherit; display:block">Dashboard</a>
    <div id="category-list"></div>
  </div>

  <div style="max-width:420px">
    <div class="eyebrow" data-i18n="nav_account">Mon compte</div>
    <h1 data-i18n="account_title">Changer mon mot de passe</h1>
    <p style="color:var(--ink-700); font-size:1.02rem; margin-bottom:1.8rem" data-i18n="account_desc">
      Renseigne ton mot de passe actuel, puis choisis-en un nouveau.
    </p>

    <form id="account-form" class="card" style="padding:1.6rem">
      <div class="field">
        <label for="current-password" data-i18n="field_current_password">Mot de passe actuel</label>
        <input id="current-password" type="password" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label for="new-password" data-i18n="field_new_password">Nouveau mot de passe</label>
        <input id="new-password" type="password" autocomplete="new-password" required>
        <small data-i18n="field_password_hint">4 caractères minimum.</small>
      </div>
      <div class="field">
        <label for="confirm-password" data-i18n="field_confirm_password">Confirmer le nouveau mot de passe</label>
        <input id="confirm-password" type="password" autocomplete="new-password" required>
      </div>
      <div class="error-text" id="account-error"></div>
      <div class="success-text" id="account-success" style="display:none; color:var(--good); font-size:.86rem; margin-bottom:.6rem"></div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_change_password">Changer le mot de passe</button>
    </form>
  </div>
</div>

<footer class="foot" data-i18n="footer_note">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script>
  applyI18n();
  const accUser = Store.requireAuth('index.html');
  if (accUser) {
    renderTopbar(null);
    const CATEGORY_META = categoryMeta();
    const categoryOrder = ['Predictif', 'Agile', 'Hybride', 'Exam', 'Quiz', 'MiniExam', 'KillMistakes'];
    document.getElementById('category-list').innerHTML = categoryOrder.map(c => {
      const m = CATEGORY_META[c];
      return `<a class="category-item" href="category.html?cat=${c}">
        <span class="dot" style="background:${m.color}"></span>${m.label}
      </a>`;
    }).join('') + `
      <div class="nav-sep"></div>
      <a class="category-item" href="library.html">
        <span class="dot" style="background:#c99a4a"></span>${t('nav_library')}
      </a>
      <a class="category-item" href="chatbot.html">
        <span class="dot" style="background:#7a5cc9"></span>${t('nav_chatbot')}
      </a>${accUser.role === 'admin' ? `
      <a class="category-item" href="books.html">
        <span class="dot" style="background:#2c7a6d"></span>${t('nav_books')}
      </a>` : ''}`;

    document.getElementById('account-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const current = document.getElementById('current-password').value;
      const next = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('account-error');
      const okEl = document.getElementById('account-success');
      okEl.style.display = 'none';
      if (next !== confirm) { errEl.textContent = t('password_mismatch_error'); return; }
      const res = Store.changePasswordVerified(accUser.username, current, next);
      if (!res.ok) { errEl.textContent = res.error; return; }
      errEl.textContent = '';
      okEl.style.display = 'block';
      okEl.textContent = t('password_changed_success');
      document.getElementById('account-form').reset();
    });
  }
</script>
</body>
</html>
