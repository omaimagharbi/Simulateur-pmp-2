<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="quiz-shell">
  <div class="quiz-top">
    <span id="quiz-position">Question 1/30</span>
    <span id="question-timer-wrap" style="display:none">
      <span data-i18n="quiz_question_timer_label">Sur cette question :</span> <span class="timer" id="question-timer">0:00</span>
    </span>
    <span class="timer" id="quiz-timer">00:00</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div id="question-mount"></div>

  <div class="q-dots" id="dots-mount"></div>

  <div class="quiz-nav">
    <button class="btn btn-ghost" id="btn-prev" data-i18n="quiz_prev">← Précédente</button>
    <div class="spacer"></div>
    <button class="btn btn-brass" id="btn-submit" data-i18n="quiz_finish">Terminer l'examen</button>
    <button class="btn btn-primary" id="btn-next" data-i18n="quiz_next">Suivante →</button>
  </div>
</div>

<div class="modal-overlay" id="break-overlay">
  <div class="modal" style="text-align:center">
    <div style="font-size:2rem; margin-bottom:.6rem">☕</div>
    <h3 id="break-title" data-i18n="break_title">Petite pause ?</h3>
    <p id="break-desc" style="color:var(--ink-700); margin-bottom:1.2rem" data-i18n="break_desc">
      Tu viens de terminer 60 questions. Comme le jour de l'examen, tu peux prendre une pause de 10 minutes ou continuer directement.
    </p>
    <div id="break-timer-wrap" style="display:none; margin-bottom:1.2rem">
      <div class="timer" id="break-countdown" style="font-size:1.8rem">10:00</div>
    </div>
    <div class="modal-actions" id="break-choice-actions" style="justify-content:center">
      <button class="btn btn-ghost" id="break-skip-btn" data-i18n="break_skip">Continuer directement</button>
      <button class="btn btn-primary" id="break-start-btn" data-i18n="break_start">Prendre une pause (10 min)</button>
    </div>
    <div class="modal-actions" id="break-resume-actions" style="display:none; justify-content:center">
      <button class="btn btn-primary" id="break-resume-btn" data-i18n="break_resume">Reprendre maintenant</button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
