<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results — PMP Simulator</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page">
  <div class="eyebrow" id="result-eyebrow">Result</div>
  <h1 id="result-title">Exam finished</h1>

  <div class="grid-2" style="margin-top:1.4rem; align-items:stretch">
    <div class="card score-hero">
      <div class="score-ring">
        <svg width="150" height="150" id="ring-svg"></svg>
        <div class="num" id="ring-num"><span>Score</span>0%</div>
      </div>
      <div>
        <div id="result-summary" style="font-size:1rem; color:var(--ink-700)"></div>
        <div style="margin-top:1rem; display:flex; gap:.7rem; flex-wrap:wrap">
          <a href="dashboard.html" class="btn btn-ghost">Back to dashboard</a>
          <a href="#" class="btn btn-primary" id="retry-link">Retry this category</a>
          <button class="btn btn-brass" id="btn-download-pdf">Download as PDF</button>
        </div>
      </div>
    </div>
    <div class="card" style="padding:1.6rem">
      <h3 style="font-size:1.05rem">Breakdown by domain</h3>
      <div id="compass-mount"></div>
    </div>
  </div>

  <div class="section-title"><h2>Detailed review</h2></div>
  <div id="review-mount"></div>
</div>

<footer class="foot">PMP Simulator — training tool, not affiliated with PMI®.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/results.js"></script>
</body>
</html>
