<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page">
  <div class="eyebrow" data-i18n="admin_area">Espace admin</div>
  <h1 data-i18n="admin_title">Administration</h1>

  <div class="admin-tabs">
    <button class="active" data-tab="questions" data-i18n="tab_questions">Questions</button>
    <button data-tab="users" data-i18n="tab_users">Utilisateurs & scores</button>
    <button data-tab="vouchers" data-i18n="tab_vouchers">Vouchers</button>
    <button data-tab="settings" data-i18n="tab_settings">Paramètres</button>
  </div>

  <div id="tab-questions">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
      <div class="stat-strip" style="gap:.7rem"><span class="pill good" id="q-count">0 questions</span></div>
      <button class="btn btn-brass" id="btn-add-question" data-i18n="add_question">+ Ajouter une question</button>
    </div>
    <div class="card" style="padding:0.4rem 1rem; overflow:auto"><table class="admin-table" id="questions-table"></table></div>
  </div>

  <div id="tab-users" style="display:none">
    <div class="grid-3" style="margin-bottom:1.6rem" id="user-stat-boxes"></div>
    <div class="card" style="padding:0.4rem 1rem; overflow:auto"><table class="admin-table" id="users-table"></table></div>
  </div>

  <div id="tab-vouchers" style="display:none">
    <div class="grid-3" style="margin-bottom:1.6rem" id="voucher-stat-boxes"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.8rem; margin-bottom:1rem">
      <div style="display:flex; gap:.6rem; flex-wrap:wrap">
        <select id="voucher-filter-method">
          <option value="">— <span data-i18n="voucher_filter_method">Méthode</span> —</option>
          <option value="Espèces" data-i18n="voucher_method_cash">Espèces</option>
          <option value="Virement" data-i18n="voucher_method_transfer">Virement</option>
          <option value="Chèque" data-i18n="voucher_method_check">Chèque</option>
          <option value="Autre" data-i18n="voucher_method_other">Autre</option>
        </select>
        <select id="voucher-filter-status">
          <option value="" data-i18n="voucher_filter_status">— Statut —</option>
          <option value="inactive" data-i18n="voucher_status_inactive">Inactif</option>
          <option value="active" data-i18n="voucher_status_active">Actif</option>
        </select>
      </div>
      <button class="btn btn-brass" id="btn-generate-voucher" data-i18n="voucher_generate_btn">+ Générer un voucher manuel</button>
    </div>

    <div class="card" style="padding:0.4rem 1rem; overflow:auto"><table class="admin-table" id="vouchers-table"></table></div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="card" style="padding:1.8rem; max-width:420px">
      <h3 style="font-size:1.05rem" data-i18n="change_admin_password">Changer le mot de passe admin</h3>
      <div class="banner warn" data-i18n="admin_shared_warning">Attention.</div>
      <form id="pw-form">
        <div class="field"><label data-i18n="new_password">Nouveau mot de passe</label><input type="password" id="new-pw" required minlength="4"></div>
        <div class="field"><label data-i18n="confirm_password">Confirmer</label><input type="password" id="confirm-pw" required minlength="4"></div>
        <div class="error-text" id="pw-error"></div>
        <button class="btn btn-primary btn-block" type="submit" data-i18n="update">Mettre à jour</button>
      </form>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title" data-i18n="modal_add_title">Ajouter une question</h3>
    <form id="question-form">
      <input type="hidden" id="f-id">
      <div class="grid-2">
        <div class="field">
          <label data-i18n="label_category">Catégorie</label>
          <select id="f-category">
            <option value="Predictif">Prédictif</option>
            <option value="Agile">Agile</option>
            <option value="Hybride">Hybride</option>
            <option value="Exam">Examen</option>
            <option value="Quiz">Quiz</option>
            <option value="MiniExam">Mini examen</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="label_domain">Domaine PMI</label>
          <select id="f-domain">
            <option value="People">People</option>
            <option value="Process">Process</option>
            <option value="Business">Business</option>
          </select>
        </div>
      </div>
      <div class="field"><label data-i18n="label_question_text">Énoncé de la question</label><textarea id="f-text" rows="3" required></textarea></div>
      <div class="field"><label><span data-i18n="label_option">Option</span> A</label><input id="f-optA" required></div>
      <div class="field"><label><span data-i18n="label_option">Option</span> B</label><input id="f-optB" required></div>
      <div class="field"><label><span data-i18n="label_option">Option</span> C</label><input id="f-optC" required></div>
      <div class="field"><label><span data-i18n="label_option">Option</span> D</label><input id="f-optD" required></div>
      <div class="field">
        <label data-i18n="label_correct_answer">Bonne réponse</label>
        <select id="f-answer"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
      </div>
      <div class="field"><label data-i18n="label_justification">Justification</label><textarea id="f-justification" rows="3"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modal-cancel" data-i18n="cancel">Annuler</button>
        <button type="submit" class="btn btn-primary" data-i18n="save">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="voucher-modal-overlay">
  <div class="modal">
    <h3 data-i18n="voucher_generate_title">Générer un voucher manuel</h3>
    <form id="voucher-form">
      <div class="field">
        <label data-i18n="voucher_field_method">Méthode de paiement</label>
        <select id="v-method">
          <option value="Espèces" data-i18n="voucher_method_cash">Espèces</option>
          <option value="Virement" data-i18n="voucher_method_transfer">Virement</option>
          <option value="Chèque" data-i18n="voucher_method_check">Chèque</option>
          <option value="Autre" data-i18n="voucher_method_other">Autre</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="voucher_field_validity">Valide jusqu'au (optionnel)</label>
        <input type="date" id="v-validity">
      </div>
      <div class="field">
        <label data-i18n="voucher_field_note">Note (optionnel)</label>
        <input type="text" id="v-note" placeholder="ex : Session Tunis — juillet 2026">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="voucher-modal-cancel" data-i18n="cancel">Annuler</button>
        <button type="submit" class="btn btn-primary" data-i18n="voucher_generate_btn">+ Générer un voucher manuel</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="voucher-result-overlay">
  <div class="modal">
    <h3 data-i18n="voucher_generated_title">Voucher créé</h3>
    <p style="color:var(--ink-700); margin-bottom:1rem" data-i18n="voucher_generated_desc">Transmets ce code au participant. Il devra le saisir à sa première connexion.</p>
    <div class="card" style="padding:1rem; text-align:center; font-family:var(--font-mono); font-size:1.3rem; font-weight:700; letter-spacing:.05em; background:var(--paper-dim)" id="voucher-generated-code"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="voucher-copy-btn" data-i18n="voucher_copy_btn">Copier le code</button>
      <button type="button" class="btn btn-primary" id="voucher-result-close" data-i18n="close">Fermer</button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
