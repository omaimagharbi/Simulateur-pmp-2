<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page">
  <div class="eyebrow">Espace admin</div>
  <h1>Administration</h1>

  <div class="admin-tabs">
    <button class="active" data-tab="questions">Questions</button>
    <button data-tab="users">Utilisateurs &amp; scores</button>
    <button data-tab="settings">Paramètres</button>
  </div>

  <div id="tab-questions">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
      <div class="stat-strip" style="gap:.7rem">
        <span class="pill good" id="q-count">0 questions</span>
      </div>
      <button class="btn btn-brass" id="btn-add-question">+ Ajouter une question</button>
    </div>
    <div class="card" style="padding:0.4rem 1rem; overflow:auto">
      <table class="admin-table" id="questions-table"></table>
    </div>
  </div>

  <div id="tab-users" style="display:none">
    <div class="grid-3" style="margin-bottom:1.6rem" id="user-stat-boxes"></div>
    <div class="card" style="padding:0.4rem 1rem; overflow:auto">
      <table class="admin-table" id="users-table"></table>
    </div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="card" style="padding:1.8rem; max-width:420px">
      <h3 style="font-size:1.05rem">Changer le mot de passe admin</h3>
      <div class="banner warn">Ce compte est partagé par toute personne ayant accès à ce navigateur. Change le mot de passe par défaut avant tout usage réel.</div>
      <form id="pw-form">
        <div class="field">
          <label>Nouveau mot de passe</label>
          <input type="password" id="new-pw" required minlength="4">
        </div>
        <div class="field">
          <label>Confirmer</label>
          <input type="password" id="confirm-pw" required minlength="4">
        </div>
        <div class="error-text" id="pw-error"></div>
        <button class="btn btn-primary btn-block" type="submit">Mettre à jour</button>
      </form>
    </div>
  </div>
</div>

<!-- Modal: ajouter / éditer une question -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Ajouter une question</h3>
    <form id="question-form">
      <input type="hidden" id="f-id">
      <div class="grid-2">
        <div class="field">
          <label>Catégorie (barre latérale)</label>
          <select id="f-category">
            <option value="Predictif">Prédictif</option>
            <option value="Agile">Agile</option>
            <option value="Hybride">Hybride</option>
            <option value="Exam">Examen</option>
            <option value="Quiz">Quiz</option>
            <option value="MiniExam">Mini examen</option>
          </select>
        </div>
        <div class="field">
          <label>Domaine PMI</label>
          <select id="f-domain">
            <option value="People">Personnes</option>
            <option value="Process">Processus</option>
            <option value="Business">Environnement commercial</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Énoncé de la question</label>
        <textarea id="f-text" rows="3" required></textarea>
      </div>
      <div class="field">
        <label>Option A</label>
        <input id="f-optA" required>
      </div>
      <div class="field">
        <label>Option B</label>
        <input id="f-optB" required>
      </div>
      <div class="field">
        <label>Option C</label>
        <input id="f-optC" required>
      </div>
      <div class="field">
        <label>Option D</label>
        <input id="f-optD" required>
      </div>
      <div class="field">
        <label>Bonne réponse</label>
        <select id="f-answer">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
      </div>
      <div class="field">
        <label>Justification (affichée dans la correction)</label>
        <textarea id="f-justification" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modal-cancel">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
