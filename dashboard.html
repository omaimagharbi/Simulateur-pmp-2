<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="shell-with-sidebar">
  <div class="category-nav">
    <div class="nav-title" data-i18n="categories_title">Catégories d'entraînement</div>
    <div id="category-list"></div>
  </div>

  <div>
    <div class="eyebrow" id="welcome-eyebrow">Bienvenue</div>
    <h1 id="welcome-title" data-i18n="dashboard_title">Prêt à t'entraîner ?</h1>

    <div class="grid-2" style="margin-top:1.4rem">
      <div class="card" style="padding:1.6rem">
        <div id="compass-mount"></div>
      </div>
      <div class="stat-strip" style="flex-direction:column; gap:1rem">
        <div class="card stat-box">
          <div class="n" id="stat-attempts">0</div>
          <div class="l" data-i18n="stat_attempts">Examens passés</div>
        </div>
        <div class="card stat-box">
          <div class="n" id="stat-best">—</div>
          <div class="l" data-i18n="stat_best">Meilleur score</div>
        </div>
        <div class="card stat-box">
          <div class="n" id="stat-min-pass">65%</div>
          <div class="l" data-i18n="stat_min_pass">Score minimum de réussite</div>
        </div>
      </div>
    </div>

    <div class="section-title"><h2 id="category-title" data-i18n="select_category">Sélectionne une catégorie</h2></div>
    <div class="card category-detail" id="category-detail-mount"></div>

    <div class="section-title"><h2 data-i18n="recent_attempts">Dernières tentatives</h2><a href="history.html" style="font-size:.85rem" data-i18n="view_all_history">Voir tout l'historique →</a></div>
    <div class="card" style="padding:0.4rem 1rem" id="recent-table-mount"></div>
  </div>
</div>

<footer class="foot" data-i18n="footer_note">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
