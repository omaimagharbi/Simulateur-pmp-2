<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page">
  <div class="eyebrow" id="result-eyebrow">Résultat</div>
  <h1 id="result-title">Examen terminé</h1>

  <div style="margin-top:1.4rem">
    <div class="card score-hero">
      <div class="score-ring">
        <svg width="150" height="150" id="ring-svg"></svg>
        <div class="num" id="ring-num"><span>Score</span>0%</div>
      </div>
      <div>
        <div id="result-summary" style="font-size:1rem; color:var(--ink-700)"></div>
        <div style="margin-top:1rem; display:flex; gap:.7rem; flex-wrap:wrap">
          <a href="dashboard.html" class="btn btn-ghost" data-i18n="back_dashboard">Retour au tableau de bord</a>
          <a href="#" class="btn btn-primary" id="retry-link" data-i18n="retry_category">Retenter cette catégorie</a>
          <button class="btn btn-brass" id="btn-download-pdf" data-i18n="download_pdf">Télécharger en PDF</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title"><h2 data-i18n="detailed_review">Correction détaillée</h2></div>
  <div id="review-mount"></div>
</div>

<footer class="foot" data-i18n="footer_note">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/results.js"></script>
</body>
</html>
