<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="shell-with-sidebar">
  <div class="category-nav">
    <div class="nav-title" data-i18n="categories_title">Dashboard</div>
    <div id="category-list"></div>
  </div>

  <div>
    <div class="kicker" id="cat-kicker" style="margin-bottom:.4rem"></div>
    <h1 id="cat-title">Catégorie</h1>
    <p id="cat-desc" style="color:var(--ink-700); max-width:56ch; font-size:1.02rem; margin-bottom:2rem"></p>

    <div class="grid-3" id="parts-grid"></div>
    <div id="empty-mount"></div>
  </div>
</div>

<footer class="foot" data-i18n="footer_note">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script>
  applyI18n();
  const catUser = Store.requireAuth('index.html');
  if (catUser) {
    renderTopbar('dashboard');
    const CATEGORY_META = categoryMeta();
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'Exam';
    const meta = CATEGORY_META[cat] || { label: cat, desc: '', color: 'var(--brass)' };

    document.title = `${meta.label} — ${t('brand')}`;

    // sidebar persistante (mise en avant de la catégorie active)
    const categoryOrder = ['Predictif', 'Agile', 'Hybride', 'Exam', 'Quiz', 'MiniExam'];
    document.getElementById('category-list').innerHTML = categoryOrder.map(c => {
      const m = CATEGORY_META[c];
      return `<a class="category-item ${c === cat ? 'active' : ''}" href="category.html?cat=${c}">
        <span class="dot" style="background:${m.color}"></span>${m.label}
      </a>`;
    }).join('');

    document.getElementById('cat-kicker').innerHTML = `<span class="dot" style="background:${meta.color}; display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:.5rem"></span><span class="eyebrow" style="color:${meta.color}">${meta.label}</span>`;
    document.getElementById('cat-title').textContent = meta.label;
    document.getElementById('cat-desc').textContent = meta.desc;

    const questions = Store.getAllQuestions().filter(q => q.category === cat);
    const parts = chunkQuestions(questions, 10);

    if (!parts.length) {
      document.getElementById('empty-mount').innerHTML = `
        <div class="empty-state card" style="padding:2.2rem">
          <div class="glyph">🗂️</div>
          ${t('empty_no_category_admin')}<br>
          ${catUser.role === 'admin' ? `<a href="admin.html" class="btn btn-brass" style="margin-top:1rem">${t('empty_no_category_admin_cta')}</a>` : t('empty_no_category_user_cta')}
        </div>`;
    } else {
      document.getElementById('parts-grid').innerHTML = parts.map((p, idx) => `
        <div class="exam-card card">
          <span class="tag">${p.length} questions</span>
          <h3>${t('exam_part_label', { n: idx + 1 })}</h3>
          <p>${meta.label}</p>
          <a href="quiz.html?cat=${cat}&part=${idx + 1}" class="btn btn-primary btn-block">${t('start_exam')}</a>
        </div>`).join('');
    }
  }
</script>
</body>
</html>
