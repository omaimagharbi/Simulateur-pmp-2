<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="brand">PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page" style="max-width:720px">
  <a href="dashboard.html" class="btn btn-ghost btn-sm" style="margin-bottom:1.4rem" data-i18n="back_dashboard">← Retour au tableau de bord</a>

  <div class="card" style="padding:2.2rem" id="category-detail-mount"></div>
</div>

<footer class="foot" data-i18n="footer_note">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script>
  applyI18n();
  const catUser = Store.requireAuth('index.html');
  if (catUser) {
    renderTopbar('dashboard');
    const CATEGORY_META = categoryMeta();
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'Exam';
    const meta = CATEGORY_META[cat] || { label: cat, desc: '', color: 'var(--brass)' };
    const count = Store.getAllQuestions().filter(q => q.category === cat).length;

    document.title = `${meta.label} — ${t('brand')}`;

    document.getElementById('category-detail-mount').innerHTML = `
      <div class="kicker"><span class="dot" style="background:${meta.color}"></span><span class="eyebrow" style="color:${meta.color}">${meta.label}</span></div>
      <h1 style="margin-top:.3rem">${meta.label}</h1>
      <p style="color:var(--ink-700); max-width:56ch; font-size:1.02rem">${meta.desc}</p>
      ${count > 0 ? `
        <div class="meta" style="margin-bottom:1.4rem">📝 ${count} ${t('questions_available')}</div>
        <a href="quiz.html?cat=${cat}" class="btn btn-primary">${t('start_session')}</a>
      ` : `
        <div class="empty-state" style="padding:1.6rem 0">
          <div class="glyph">🗂️</div>
          ${t('empty_no_category_admin')}<br>
          ${catUser.role === 'admin' ? `<a href="admin.html" class="btn btn-brass" style="margin-top:1rem">${t('empty_no_category_admin_cta')}</a>` : t('empty_no_category_user_cta')}
        </div>
      `}`;
  }
</script>
</body>
</html>
