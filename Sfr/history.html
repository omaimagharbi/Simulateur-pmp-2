<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique — PMP Simulateur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar-mount"></div>

<div class="page">
  <div class="eyebrow">Historique</div>
  <h1>Toutes tes tentatives</h1>
  <div class="card" style="padding:0.4rem 1rem; margin-top:1.4rem" id="table-mount"></div>
</div>

<footer class="foot">PMP Simulateur — outil d'entraînement non affilié au PMI®.</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script>
  const histUser = Store.requireAuth('index.html');
  if (histUser) {
    renderTopbar('history');
    const attempts = Store.getAttemptsForUser(histUser.username).sort((a,b) => new Date(b.date) - new Date(a.date));
    const mount = document.getElementById('table-mount');
    if (!attempts.length) {
      mount.innerHTML = `<div class="empty-state"><div class="glyph">📋</div>Aucune tentative pour l'instant.<br><a href="dashboard.html" class="btn btn-primary" style="margin-top:1rem">Lancer un examen</a></div>`;
    } else {
      mount.innerHTML = `
        <table class="history">
          <thead><tr><th>Catégorie</th><th>Date</th><th>Score</th><th>Durée</th><th></th></tr></thead>
          <tbody>
            ${attempts.map(a => {
              const pct = Math.round((a.score/a.total)*100);
              const meta = CATEGORY_META[a.category] || { label: a.category };
              return `<tr>
                <td>${meta.label}</td>
                <td>${formatDate(a.date)}</td>
                <td><span class="pill ${pct>=61?'good':'bad'}">${a.score}/${a.total} · ${pct}%</span></td>
                <td>${formatDuration(a.durationSeconds)}</td>
                <td><a href="results.html?id=${a.id}" class="btn btn-ghost btn-sm">Revoir</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }
  }
</script>
</body>
</html>
